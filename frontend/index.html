<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptAI</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --text: #f0f0f0;
      --accent: #ffffff;
      --success: #22c55e;
      --warning: #eab308;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }
    .sidebar { width: 280px; background: var(--surface); border-right: 1px solid #222; padding: 2rem 1.5rem; overflow-y: auto; }
    .main { flex: 1; display: flex; flex-direction: column; }
    .logo { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.8px; }
    .chat-container { flex: 1; overflow-y: auto; padding: 2rem; display: flex; flex-direction: column; gap: 1.5rem; }
    .message {
      max-width: 75%;
      padding: 1.1rem 1.4rem;
      border-radius: 14px;
      line-height: 1.55;
    }
    .user { align-self: flex-end; background: var(--accent); color: #000; }
    .bot { align-self: flex-start; background: var(--surface); border: 1px solid #333; }
    .coach-note { border-left: 3px solid #666; padding-left: 1rem; opacity: 0.9; }
    .input-area { background: var(--surface); padding: 1.5rem 2rem; border-top: 1px solid #222; }
    .input-wrapper { display: flex; gap: 0.8rem; max-width: 820px; margin: 0 auto; }
    input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      color: var(--text);
      padding: 1.1rem 1.4rem;
      border-radius: 9999px;
      font-size: 1.05rem;
    }
    button {
      background: #fff;
      color: #000;
      border: none;
      width: 56px;
      height: 56px;
      border-radius: 9999px;
      cursor: pointer;
      font-size: 1.4rem;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo">PromptAI</div>
    <p style="opacity:0.6; margin-top:8px;">Backend Connected</p>
  </div>

  <div class="main">
    <header style="background:#111; padding:1.25rem 2rem; border-bottom:1px solid #222;">
      <div>Gemma 4 9B • FastAPI</div>
    </header>

    <div class="chat-container" id="chat"></div>

    <div class="input-area">
      <div class="input-wrapper">
        <input type="text" id="user-input" placeholder="Type your prompt here..." autocomplete="off">
        <button id="send-btn">↑</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "http://127.0.0.1:8000";
    const chat = document.getElementById('chat');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    function addMessage(text, isUser) {
      const msg = document.createElement('div');
      msg.className = `message ${isUser ? 'user' : 'bot'}`;
      msg.innerHTML = text;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, true);
      input.value = "";

      // Show thinking
      const thinking = document.createElement('div');
      thinking.className = 'message bot';
      thinking.textContent = "Analysing with DistilBERT...";
      chat.appendChild(thinking);
      chat.scrollTop = chat.scrollHeight;

      try {
        // Step 1: Analyze
        const analyzeRes = await fetch(`${API_BASE}/analyze`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt: text, mode: "humanised" })
        });
        const analyzeData = await analyzeRes.json();

        thinking.remove();

        if (analyzeData.clarification_needed && analyzeData.questions.length > 0) {
          addMessage(analyzeData.message + "<br><br><strong>Asking clarification questions...</strong>", false);
          // For simplicity, we'll send to full chat with empty answers for now
        }

        // Step 2: Full Chat (you can extend this to handle clarification flow)
        const chatRes = await fetch(`${API_BASE}/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            prompt: text,
            mode: "humanised",
            clarification_answers: {}   // Add real answers later
          })
        });

        const chatData = await chatRes.json();
        addMessage(`<strong>Response:</strong><br><br>${chatData.response}`, false);

      } catch (err) {
        thinking.remove();
        addMessage("❌ Error connecting to backend. Is the server running?", false);
        console.error(err);
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', e => {
      if (e.key === 'Enter') sendMessage();
    });

    // Welcome
    window.onload = () => {
      addMessage("👋 Welcome to <strong>PromptAI</strong>!<br>I'm connected to your FastAPI backend.", false);
    };
  </script>
</body>
</html>
