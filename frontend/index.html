<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptAI</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --text: #f0f0f0;
      --accent: #ffffff;
      --success: #22c55e;
      --warning: #eab308;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: var(--surface);
      border-right: 1px solid #222;
      padding: 2rem 1.5rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.8px;
    }

    .tagline {
      font-size: 0.85rem;
      opacity: 0.6;
      margin-top: 4px;
    }

    .section-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.6;
      margin-bottom: 0.75rem;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.65rem 0;
      border-bottom: 1px solid #222;
    }

    .stat:last-child { border-bottom: none; }

    .dim-name { font-weight: 500; }
    .dim-status {
      font-size: 0.8rem;
      padding: 3px 9px;
      border-radius: 9999px;
      font-weight: 500;
    }
    .present { background: rgba(34, 197, 94, 0.15); color: var(--success); }
    .missing { background: rgba(234, 179, 8, 0.15); color: var(--warning); }

    .accuracy-bar {
      height: 5px;
      background: #222;
      border-radius: 9999px;
      margin-top: 5px;
    }
    .accuracy-fill {
      height: 100%;
      background: var(--accent);
    }

    /* Toggle */
    .toggle-container {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #1a1a1a;
      padding: 6px;
      border-radius: 9999px;
      width: fit-content;
    }

    .toggle-btn {
      padding: 6px 16px;
      border-radius: 9999px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .toggle-btn.active {
      background: #fff;
      color: #000;
      font-weight: 600;
    }

    /* Main Area */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      padding: 1.25rem 2rem;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.6rem;
    }

    .message {
      max-width: 75%;
      padding: 1.1rem 1.4rem;
      border-radius: 14px;
      line-height: 1.55;
    }

    .user {
      align-self: flex-end;
      background: var(--accent);
      color: #000;
      border-bottom-right-radius: 4px;
    }

    .bot {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid #333;
      border-bottom-left-radius: 4px;
    }

    .coach-note {
      font-size: 0.9rem;
      opacity: 0.75;
      border-left: 3px solid #666;
      padding-left: 1rem;
    }

    .input-area {
      background: var(--surface);
      padding: 1.5rem 2rem;
      border-top: 1px solid #222;
    }

    .input-wrapper {
      display: flex;
      gap: 0.8rem;
      max-width: 820px;
      margin: 0 auto;
    }

    input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      color: var(--text);
      padding: 1.1rem 1.4rem;
      border-radius: 9999px;
      font-size: 1.05rem;
      outline: none;
    }

    input:focus {
      border-color: var(--accent);
    }

    button {
      background: #fff;
      color: #000;
      border: none;
      width: 56px;
      height: 56px;
      border-radius: 9999px;
      cursor: pointer;
      font-size: 1.4rem;
    }

    button:hover {
      background: #ddd;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <div>
      <div class="logo">PromptAI</div>
      <div class="tagline">Adaptive • Humanised • Local</div>
    </div>

    <!-- Response Mode Toggle -->
    <div>
      <div class="section-title">Response Mode</div>
      <div class="toggle-container" id="mode-toggle">
        <div class="toggle-btn active" data-mode="humanised">Humanised</div>
        <div class="toggle-btn" data-mode="standard">Standard</div>
      </div>
    </div>

    <!-- Dimension Analysis -->
    <div>
      <div class="section-title">Prompt Analysis</div>
      <div id="dimensions"></div>
    </div>

    <!-- Classifier Accuracy -->
    <div>
      <div class="section-title">DistilBERT Accuracy</div>
      <div id="accuracy-stats"></div>
    </div>
  </div>

  <!-- Chat Area -->
  <div class="main">
    <header>
      <div>Gemma 4 • Ollama</div>
      <div style="font-size: 0.9rem; opacity: 0.6;">Hammad Safi</div>
    </header>

    <div class="chat-container" id="chat"></div>

    <div class="input-area">
      <div class="input-wrapper">
        <input type="text" id="user-input" placeholder="Write your prompt here..." autocomplete="off">
        <button id="send-btn">↑</button>
      </div>
    </div>
  </div>

  <script>
    let currentMode = "humanised"; // humanised or standard

    // Sample dimensions
    let currentDimensions = [
      { name: "Goal", status: "present", accuracy: 92 },
      { name: "Audience", status: "missing", accuracy: 78 },
      { name: "Format", status: "present", accuracy: 85 },
      { name: "Constraints", status: "missing", accuracy: 71 },
      { name: "Context", status: "present", accuracy: 88 }
    ];

    function renderDimensions() {
      const container = document.getElementById('dimensions');
      container.innerHTML = currentDimensions.map(dim => `
        <div class="stat">
          <span class="dim-name">${dim.name}</span>
          <span class="dim-status ${dim.status}">${dim.status.toUpperCase()}</span>
        </div>
      `).join('');
    }

    function renderAccuracy() {
      const container = document.getElementById('accuracy-stats');
      container.innerHTML = currentDimensions.map(dim => `
        <div class="stat">
          <div style="width: 100%;">
            <div style="display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 4px;">
              <span>${dim.name}</span>
              <span>${dim.accuracy}%</span>
            </div>
            <div class="accuracy-bar">
              <div class="accuracy-fill" style="width: ${dim.accuracy}%"></div>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Toggle Logic
    function setupToggle() {
      const toggleContainer = document.getElementById('mode-toggle');
      const buttons = toggleContainer.querySelectorAll('.toggle-btn');

      buttons.forEach(btn => {
        btn.addEventListener('click', () => {
          buttons.forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          currentMode = btn.dataset.mode;
          
          // Optional: Show a small notification
          console.log(`Response mode changed to: ${currentMode}`);
        });
      });
    }

    const chat = document.getElementById('chat');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    function addMessage(text, isUser, isCoach = false) {
      const msg = document.createElement('div');
      msg.className = `message ${isUser ? 'user' : 'bot'}`;
      if (isCoach) msg.classList.add('coach-note');
      msg.innerHTML = text;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, true);
      input.value = '';

      const thinking = document.createElement('div');
      thinking.className = 'message bot';
      thinking.textContent = 'Analysing with DistilBERT...';
      chat.appendChild(thinking);
      chat.scrollTop = chat.scrollHeight;

      setTimeout(() => {
        thinking.remove();

        addMessage("Analysis complete.<br><strong>Missing:</strong> Audience, Constraints", false, true);

        // Final Gemma Response
        setTimeout(() => {
          const modeText = currentMode === "humanised" 
            ? "<strong>Humanised Response (Gemma 4):</strong><br><br>" 
            : "<strong>Standard Response:</strong><br><br>";

          const responseText = currentMode === "humanised" 
            ? "Thank you for reaching out. After reviewing the details you shared, here's a clear and practical overview tailored for students like yourself..." 
            : "The answer to your query is as follows...";

          addMessage(modeText + responseText, false);
        }, 900);
      }, 1300);
    }

    // Event Listeners
    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', e => {
      if (e.key === 'Enter') sendMessage();
    });

    // Initialize
    window.onload = () => {
      renderDimensions();
      renderAccuracy();
      setupToggle();

      setTimeout(() => {
        addMessage("👋 Welcome to <strong>PromptAI</strong>.<br>I analyse your prompt, coach when needed, and respond using Gemma 4.", false);
      }, 400);
    };
  </script>
</body>
</html>
